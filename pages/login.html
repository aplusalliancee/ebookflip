<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In – EbookFlip</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/global.css">
</head>
<body>

<nav id="main-nav">
  <a class="logo" href="../index.html">Ebook<span>Flip</span></a>
  <div class="nav-right">
    <a class="nav-link" href="../index.html">← Home</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to access your digital library</p>

    <div class="auth-error" id="login-error"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="form-submit" onclick="doLogin()">Sign In →</button>

    <div class="auth-switch">
      Don't have an account? <a href="signup.html">Create one free</a>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-title" id="toast-title"></div>
  <div class="toast-sub"   id="toast-sub"></div>
</div>

<script src="../js/auth.js"></script>
<script>
  /* If already logged in, redirect */
  (function() {
    const u = Auth.getCurrentUser();
    if (u && u.plan) { window.location.href = 'dashboard.html'; }
    else if (u)      { window.location.href = 'checkout.html'; }
  })();

  function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-password').value;
    const err   = document.getElementById('login-error');

    const result = Auth.login(email, pass);
    if (result.ok) {
      err.style.display = 'none';
      /* Redirect: if they have a plan → dashboard, else → checkout */
      const plan = new URLSearchParams(window.location.search).get('plan');
      if (result.user.plan) {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'checkout.html' + (plan ? '?plan=' + plan : '');
      }
    } else {
      err.textContent  = result.error;
      err.style.display = 'block';
    }
  }

  /* Allow pressing Enter to submit */
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
